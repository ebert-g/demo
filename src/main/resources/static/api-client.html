<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas - API Client</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
</head>

<body>
  <div class="container mt-5">

    <h1 class="mb-4 text-center">LISTA DE TAREFAS</h1>

    <form id="add-tarefa-form" class="mb-4 p-4 border rounded bg-light">
      <div class="row g-3">
        <div class="col-md-5">
          <input type="text" id="nome-tarefa" class="form-control" placeholder="Nova Tarefa..." required />
        </div>
        <div class="col-md-5">
          <input type="text" id="descricao-tarefa" class="form-control" placeholder="Descrição..." required />
        </div>
        <div class="col-md-2 d-grid">
          <button type="submit" class="btn btn-primary">ADD</button>
        </div>
      </div>
    </form>

    <hr />

    <div id="lista-tarefas">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">
            A carrgar...
          </span>
        </div>
        <p class="mt-2"> A carregar tarefas...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="api-client.js"></script>
</body>

</html>
